name: Deploy Snapcar Tracker

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_REPOSITORY: ghcr.io/eazy-drive-development/snapcar-application-tracker
  DEPLOY_DIR: /home/eazydrive/snapcar-tracker/prod
  COMPOSE_PROJECT_NAME: snapcar-tracker-prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}/backend:main
            ${{ env.IMAGE_REPOSITORY }}/backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}/frontend:main
            ${{ env.IMAGE_REPOSITORY }}/frontend:${{ github.sha }}

      - name: Create deploy directory on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            mkdir -p ${{ env.DEPLOY_DIR }}

      - name: Copy Docker Compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          source: docker-compose.prod.yml
          target: ${{ env.DEPLOY_DIR }}
          timeout: 30s

      - name: Deploy containers on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd ${{ env.DEPLOY_DIR }}
            echo "${{ secrets.VPS_GITHUB_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker compose -p ${{ env.COMPOSE_PROJECT_NAME }} -f docker-compose.prod.yml --env-file .env.prod pull
            docker compose -p ${{ env.COMPOSE_PROJECT_NAME }} -f docker-compose.prod.yml --env-file .env.prod up -d
            docker image prune -f
