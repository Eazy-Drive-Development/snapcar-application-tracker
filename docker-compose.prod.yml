name: snapcar-tracker-prod

services:
  backend:
    image: ghcr.io/eazy-drive-development/snapcar-application-tracker/backend:main
    expose:
      - "4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      LOGIN_USERNAME: ${LOGIN_USERNAME}
      LOGIN_PASSWORD: ${LOGIN_PASSWORD}
      CASHFREE_CLIENT_ID: ${CASHFREE_CLIENT_ID}
      CASHFREE_CLIENT_SECRET: ${CASHFREE_CLIENT_SECRET}
      CASHFREE_APP_ID: ${CASHFREE_APP_ID:-}
      CASHFREE_SECRET_KEY: ${CASHFREE_SECRET_KEY:-}
      CASHFREE_API_VERSION: ${CASHFREE_API_VERSION:-2025-01-01}
      CASHFREE_BASE_URL: ${CASHFREE_BASE_URL:-https://api.cashfree.com/pg}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SALES_REPORT_FROM: ${SALES_REPORT_FROM}
      SALES_REPORT_TO: ${SALES_REPORT_TO}
      SALES_REPORT_CRON: ${SALES_REPORT_CRON}
      SALES_REPORT_TIME_ZONE: ${SALES_REPORT_TIME_ZONE:-Asia/Kolkata}
    restart: unless-stopped

  frontend:
    image: ghcr.io/eazy-drive-development/snapcar-application-tracker/frontend:main
    ports:
      - "8082:80"
    depends_on:
      - backend
    restart: unless-stopped
